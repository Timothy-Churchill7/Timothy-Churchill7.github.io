name: Deploy to GitHub Pages

# Builds the Vite site in solarSystem/ and publishes its static output to the
# `gh-pages` branch on every push to `main`. In the repo settings, set
# Pages → Build and deployment → Source: "Deploy from a branch" → `gh-pages` / root.

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: write # needed to push the built site to the gh-pages branch

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: solarSystem/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: solarSystem

      - name: Build
        run: npm run build
        working-directory: solarSystem

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./solarSystem/dist
